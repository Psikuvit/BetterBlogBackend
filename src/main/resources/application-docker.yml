spring:
  application:
    name: BetterBlog
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mongodb:
    uri: ${SPRING_MONGODB_URI:mongodb://admin:password123@mongodb:27017/betterblog?authSource=admin}
    database: ${SPRING_MONGODB_DATABASE:betterblog}

management:
  health:
    mongodb:
      enabled: false

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:hy1F--_ZKej:8+4U3$JzpGyU-2ig9q@]gqq9/f$lD;n}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# Logging
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    me.psikuvit.betterblog: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:DEBUG}

