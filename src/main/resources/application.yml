spring:
  application:
    name: BetterBlog
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mongodb:
    uri: ${SPRING_MONGODB_URI:mongodb://localhost:27017/betterblog}
    database: ${SPRING_MONGODB_DATABASE:betterblog}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:hy1F--_ZKej:8+4U3$JzpGyU-2ig9q@]gqq9/f$lD;n}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

app:
  resend:
    api-key: ${RESEND_API_KEY:}
  mail:
    from: ${MAIL_FROM:no-reply@betterblog.com}
  password-reset:
    code-validity-minutes: ${PASSWORD_RESET_CODE_TTL_MINUTES:30}

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# Management / Actuator (expose Prometheus endpoint)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

# Logging
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    me.psikuvit.betterblog: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:DEBUG}

